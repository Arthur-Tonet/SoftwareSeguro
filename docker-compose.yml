services:
  web:
    build: .
    container_name: helpit_web
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./storage/logs:/var/www/html/storage/logs
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_BASE_PATH: ""
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: helpit
      DB_USERNAME: helpit_user
      DB_PASSWORD: helpit_pass_2026
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mariadb:11
    container_name: helpit_db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root_helpit_2026
      MARIADB_DATABASE: helpit
      MARIADB_USER: helpit_user
      MARIADB_PASSWORD: helpit_pass_2026
    ports:
      - "3307:3306"
    volumes:
      - helpit_db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "helpit_user", "-phelpit_pass_2026"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  helpit_db_data:
